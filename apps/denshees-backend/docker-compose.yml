version: "3.8"

services:
  hono-app:
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
    build:
      context: .
    container_name: hono_backend
    ports:
      - "8100:8100"
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:alpine
    container_name: redis_server
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
