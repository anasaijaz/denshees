services:
  backend:
    build:
      context: .
      dockerfile: apps/denshees-backend/Dockerfile.monorepo
    ports:
      - "8100:8100"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: .
      dockerfile: apps/denshees-frontend/Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8100
      - DATABASE_URL=${DATABASE_URL}
      - API_KEY=${API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DODO_PAYMENTS_API_KEY=${DODO_PAYMENTS_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SUPPORT_NOTIFY_EMAILS=${SUPPORT_NOTIFY_EMAILS}
    depends_on:
      - backend
    restart: always

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
